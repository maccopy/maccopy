name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG & publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch version in UpdateChecker.swift
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' \
            "s/static let currentVersion = \".*\"/static let currentVersion = \"$VERSION\"/" \
            Sources/Maccopy/UpdateChecker.swift

      - name: Build DMG
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash Scripts/make_dmg.sh .
          echo "DMG: $(du -sh Maccopy-${{ steps.version.outputs.version }}.dmg | cut -f1)"

      - name: Copy pkg to root for upload
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: cp .build/Maccopy-$VERSION.pkg Maccopy-$VERSION.pkg

      - name: Create ZIP (app-only alternative)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd .build/bundle
          zip -r --symlinks "../../Maccopy-$VERSION.zip" Maccopy.app

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Maccopy v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            Maccopy-${{ steps.version.outputs.version }}.pkg
            Maccopy-${{ steps.version.outputs.version }}.dmg
            Maccopy-${{ steps.version.outputs.version }}.zip
