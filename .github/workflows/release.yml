name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG & publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch version in UpdateChecker.swift
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' \
            "s/static let currentVersion = \".*\"/static let currentVersion = \"$VERSION\"/" \
            Sources/ClipboardManager/UpdateChecker.swift

      - name: Build DMG
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash Scripts/make_dmg.sh .
          echo "DMG: $(du -sh ClipboardManager-${{ steps.version.outputs.version }}.dmg | cut -f1)"

      - name: Create ZIP (alternative download)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd .build/bundle
          zip -r --symlinks "../../ClipboardManager-$VERSION.zip" ClipboardManager.app

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Clipboard Manager v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ClipboardManager-${{ steps.version.outputs.version }}.dmg
            ClipboardManager-${{ steps.version.outputs.version }}.zip
